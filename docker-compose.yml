version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: aprendeti-web
    restart: unless-stopped
    ports:
      - "80:3000"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: aprendeti-api
    restart: unless-stopped
    volumes:
      - sqlite_data:/data/db
      - uploads_data:/data/uploads

volumes:
  sqlite_data:
  uploads_data:
