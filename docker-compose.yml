version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: aprendeti-web
    restart: unless-stopped
    ports:
      - "80:3000"
    depends_on:
      - api

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aprendeti-api
    restart: unless-stopped
    environment:
      - JWT_SECRET=aprendeti_producao_secret_key_2026
      - WEBAUTHN_RP_ID=aprendeti.uman-app.uk
      - WEBAUTHN_ORIGIN=https://aprendeti.uman-app.uk
      - ADMIN_USER=admin
      - ADMIN_PASS=admin123
      - ADMIN_EMAIL=admin@local.dev
    volumes:
      - sqlite_data:/data/db
      - uploads_data:/data/uploads

volumes:
  sqlite_data:
  uploads_data:
