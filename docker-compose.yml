version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: aprendeti-web
    restart: unless-stopped
    ports:
      - "80:3000"
    depends_on:
      - api

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aprendeti-api
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - WEBAUTHN_RP_ID=${WEBAUTHN_RP_ID}
      - WEBAUTHN_ORIGIN=${WEBAUTHN_ORIGIN}
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASS=${ADMIN_PASS}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
    volumes:
      - /data/infra/api/db:/data/db
      - /data/infra/api/uploads:/data/uploads


